name: Build Android Debug APK

on:
  push:
    paths:
      - 'docs/**'
      - 'frontend/**'
      - 'android/**'
      - '.github/workflows/android-debug.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0" || \
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"
          yes | sdkmanager --licenses

      - name: Build Debug APK
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -f docs/index.html android/app/src/main/assets/public/index.html || true
          cp -f docs/app.js android/app/src/main/assets/public/app.js || true
          cp -f docs/main.css android/app/src/main/assets/public/main.css || true
          # Optional extras if present
          [ -f docs/lacre-report.js ] && cp -f docs/lacre-report.js android/app/src/main/assets/public/lacre-report.js || true
          [ -f docs/ui.js ] && cp -f docs/ui.js android/app/src/main/assets/public/ui.js || true
          [ -f docs/api.js ] && cp -f docs/api.js android/app/src/main/assets/public/api.js || true
          [ -f docs/config.js ] && cp -f docs/config.js android/app/src/main/assets/public/config.js || true
          gradle -p android assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
